name: Backend-Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "배포 실행 모드"
        type: choice
        required: false
        default: private_runner
        options:
          - private_runner
          - public_ssh
      deploy_strategy:
        description: "앱 배포 전략"
        type: choice
        required: false
        default: blue_green
        options:
          - blue_green
          - rolling

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: miyou-dialogue

jobs:
  validate-deploy-contract:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 배포 계약 정적 검증
        shell: bash
        run: |
          bash ./scripts/validate-deploy-contract.sh

  gradle-test:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle 캐시 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: 테스트 실행
        run: ./gradlew --no-daemon --build-cache :app-miyou:test

  gradle-compile:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle 캐시 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: 컴파일 검증
        run: ./gradlew --no-daemon --build-cache :app-miyou:compileJava

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - gradle-compile
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: QEMU 설정
        uses: docker/setup-qemu-action@v3

      - name: Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 메타데이터 생성
        id: meta
        shell: bash
        run: |
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_REF="${{ env.REGISTRY }}/${OWNER_LOWER}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${OWNER_LOWER}/${{ env.IMAGE_NAME }}:latest"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Docker 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app-miyou/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha,scope=miyou-dialogue-image
          cache-to: type=gha,mode=max,scope=miyou-dialogue-image

  deploy-public-ssh:
    if: ${{ github.event.inputs.deploy_mode == 'public_ssh' }}
    runs-on: ubuntu-latest
    needs:
      - gradle-test
      - build-and-push
      - validate-deploy-contract
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 배포 시크릿 사전 검증
        shell: bash
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "EC2_HOST 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "EC2_USER 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" || (echo "EC2_SSH_PRIVATE_KEY 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.GHCR_TOKEN }}" || (echo "GHCR_TOKEN 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.GHCR_USERNAME }}" || (echo "GHCR_USERNAME 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.SSM_PATH }}" || (echo "SSM_PATH 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.AWS_REGION }}" || (echo "AWS_REGION 시크릿이 비어 있습니다." >&2; exit 1)

      - name: SSH 키/호스트 설정
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.EC2_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config

      - name: 원격 서버 GHCR 로그인
        shell: bash
        run: |
          ssh deploy-target \
            "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin"

      - name: 원격 백엔드 배포 실행
        env:
          APP_IMAGE: ${{ needs.build-and-push.outputs.image_ref }}
          SSM_PATH: ${{ secrets.SSM_PATH }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.deploy_strategy }}" == "rolling" ]]; then
            ./deploy/aws/deploy_remote_compose.sh "deploy-target"
          else
            ./deploy/aws/deploy_remote_blue_green.sh "deploy-target"
          fi

  deploy-private-runner:
    if: ${{ github.event.inputs.deploy_mode == 'private_runner' }}
    runs-on: [self-hosted, linux, miyou-private]
    needs:
      - gradle-test
      - build-and-push
      - validate-deploy-contract
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 배포 시크릿 사전 검증
        shell: bash
        run: |
          test -n "${{ secrets.EC2_PRIVATE_HOST }}" || (echo "EC2_PRIVATE_HOST 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "EC2_USER 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" || (echo "EC2_SSH_PRIVATE_KEY 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.GHCR_TOKEN }}" || (echo "GHCR_TOKEN 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.GHCR_USERNAME }}" || (echo "GHCR_USERNAME 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.SSM_PATH }}" || (echo "SSM_PATH 시크릿이 비어 있습니다." >&2; exit 1)
          test -n "${{ secrets.AWS_REGION }}" || (echo "AWS_REGION 시크릿이 비어 있습니다." >&2; exit 1)

      - name: SSH 키/호스트 설정
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.EC2_PRIVATE_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config

      - name: 원격 서버 GHCR 로그인
        shell: bash
        run: |
          ssh deploy-target \
            "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin"

      - name: 원격 백엔드 배포 실행
        env:
          APP_IMAGE: ${{ needs.build-and-push.outputs.image_ref }}
          SSM_PATH: ${{ secrets.SSM_PATH }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.deploy_strategy }}" == "rolling" ]]; then
            ./deploy/aws/deploy_remote_compose.sh "deploy-target"
          else
            ./deploy/aws/deploy_remote_blue_green.sh "deploy-target"
          fi
