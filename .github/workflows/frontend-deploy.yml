name: Frontend-Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 프론트엔드 빌드
        shell: bash
        run: |
          ./scripts/sync_frontend_to_static.sh

      - name: S3 업로드 사전 검증
        shell: bash
        run: |
          test -n "${{ secrets.AWS_ROLE_ARN }}" || (echo "AWS_ROLE_ARN secret is missing." >&2; exit 1)
          test -n "${{ secrets.AWS_REGION }}" || (echo "AWS_REGION secret is missing." >&2; exit 1)
          test -n "${{ secrets.FRONTEND_S3_BUCKET }}" || (echo "FRONTEND_S3_BUCKET secret is missing." >&2; exit 1)

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-frontend-upload

      - name: 프론트엔드 S3 업로드
        env:
          FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        shell: bash
        run: |
          aws s3 sync "frontend/dist" "s3://${FRONTEND_S3_BUCKET}/" --delete
