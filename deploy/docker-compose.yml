services:
  mongodb:
    image: mongo:7.0
    container_name: webflux-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: ragdb
    volumes:
      - mongodb-data:/data/db
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - webflux-network

  mongo-setup:
    image: mongo:7.0
    container_name: webflux-mongodb-setup
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    command: >
      mongosh --host mongodb:27017 --eval
      "try { rs.status(); print('RS already initialized') } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}); print('RS initialized') }"
    networks:
      - webflux-network

  redis:
    image: redis:7.2-alpine
    container_name: webflux-redis
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - webflux-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: webflux-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - webflux-network

volumes:
  mongodb-data:
  redis-data:
  qdrant-data:

networks:
  webflux-network:
    driver: bridge
