services:
  redis:
    image: redis:7.2-alpine
    container_name: miyou-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - miyou-network

  app_blue:
    image: ${APP_IMAGE:-ghcr.io/imgdevel/miyou-dialogue:latest}
    container_name: miyou-dialogue-app-blue
    restart: unless-stopped
    expose:
      - "8081"
    env_file:
      - .env.deploy
    depends_on:
      - redis
    networks:
      - miyou-network

  app_green:
    image: ${APP_IMAGE:-ghcr.io/imgdevel/miyou-dialogue:latest}
    container_name: miyou-dialogue-app-green
    restart: unless-stopped
    expose:
      - "8081"
    env_file:
      - .env.deploy
    depends_on:
      - redis
    networks:
      - miyou-network

  nginx:
    image: nginx:1.27-alpine
    container_name: miyou-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx:/etc/nginx/conf.d:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    networks:
      - miyou-network

volumes:
  redis-data:

networks:
  miyou-network:
    driver: bridge
